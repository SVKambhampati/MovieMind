<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark warm background -->
  <rect width="32" height="32" rx="7" fill="#0D0A08"/>

  <!-- Film strip top sprockets -->
  <rect x="4"  y="3" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="9.5"  y="3" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="15" y="3" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="20.5" y="3" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="26" y="3" width="2"   height="2.5" rx="0.7" fill="#D4A017"/>

  <!-- Film strip bottom sprockets -->
  <rect x="4"  y="26.5" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="9.5"  y="26.5" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="15" y="26.5" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="20.5" y="26.5" width="3.5" height="2.5" rx="0.7" fill="#D4A017"/>
  <rect x="26" y="26.5" width="2"   height="2.5" rx="0.7" fill="#D4A017"/>

  <!-- Geometric M — two peaks meeting in centre -->
  <path d="M5.5 23 L5.5 11 L16 20.5 L26.5 11 L26.5 23"
        fill="none"
        stroke="#F5EDD6"
        stroke-width="3"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
</svg>
