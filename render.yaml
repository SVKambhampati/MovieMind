services:
  - type: web
    name: moviemind
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: TMDB_API_TOKEN
        sync: false
      - key: OMDB_API_KEY
        sync: false
    disk:
      name: moviemind-data
      mountPath: /opt/render/project/src/backend/instance
      sizeGB: 1
